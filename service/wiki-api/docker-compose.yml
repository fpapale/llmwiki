version: '3.8'

services:
  wiki-api:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ../../runtime/config:/config:ro
      - ../../raw:/vault/raw
      - ../../wiki:/vault/wiki
    environment:
      - WIKI_API_CONFIG_PATH=/config/config.yaml
      - WIKI_API_SECRETS_PATH=/config/secrets.env
